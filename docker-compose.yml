version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: streamhub-mysql
    environment:
      MYSQL_DATABASE: streamhub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: streamhub-app
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
      JWT_SECRET: 01234567890123456789012345678901
    ports:
      - "8080:8080"

volumes:
  mysql_data: